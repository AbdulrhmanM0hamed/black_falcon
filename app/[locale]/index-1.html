<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loader Extract</title>
    <style>
        /* =========================================
           CSS ุงูุฎุงุต ุจุงูู Loader
        ========================================= */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* ููููู ุชุบููุฑ ููู ุงูุฎูููุฉ ูู ููุง */
            background-color: #0a0a0a; 
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .loader-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: transparent !important;
        }

        #plane {
            position: relative; 
            animation: plane 2s ease infinite alternate;
            transform-origin: center;
            max-width: 300px;
            height: auto;
        }

        @keyframes plane {
            from { transform: rotate(15deg) translateY(-30px); }
            to { transform: rotate(-10deg) translateY(30px); }
        }

        .wind1, .wind2, .wind3 {
            width: 300px;
            height: auto;
            position: absolute;
            opacity: 1;
            z-index: -1;
        }

        .wind1 { top: 20%; animation: winds 3s ease-in-out infinite; }
        .wind2 { top: 60%; animation: winds 4s ease-in-out infinite; }
        .wind3 { top: 10%; animation: winds 2s ease-in-out infinite; }
        
        @keyframes winds {
            0% { right: -20%; opacity: 0; }
            25% { opacity: 1; }
            100% { right: 120%; opacity: 1; }
        }

        .loader-hidden {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
